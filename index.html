<html lang="en">

    .retry-btn{border:1px solid rgba(255,255,255,.18);background:linear-gradient(160deg,rgb(90,90,112) 0%,rgb(62,62,82) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 1px 4px rgba(0,0,0,.45);padding:3px 7px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.85);font-size:14px;line-height:1;display:inline-flex;align-items:center;flex-shrink:0;margin-right:6px;transition:background .15s,color .15s,border-color .15s,box-shadow .15s}
    .retry-btn:hover{background:linear-gradient(160deg,rgb(108,108,134) 0%,rgb(78,78,100) 100%);border-color:rgba(255,255,255,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.32),0 1px 6px rgba(0,0,0,.5);color:#fff}

    /* Bubble content */

<body>
<div class="stage">

  <div id="bg-math" class="bg-float visible">
    <div class="float-card">
      <img src="1.png" alt="Navier-Stokes equations">
    </div>
  </div>

  <div id="app">
    <div id="header">
      <span class="logo-text" id="logo">LOOK</span>
      <div class="header-actions">
        <div id="status-dot"></div>
        <button class="icon-btn" id="copy-latex-btn" title="Copy LaTeX" style="display:none" onclick="copyLatex()">∑</button>
        <button class="icon-btn" onclick="restart()">↺</button>
        <button class="icon-btn" style="cursor:not-allowed" title="(demo only)">✕</button>
      </div>
    </div>
    <div id="body">
      <div id="loading"><div class="spinner"></div></div>
      <div id="messages"></div>
    </div>
    <div id="input-bar">
      <div id="input-wrap">
        <textarea id="chat-input" rows="1" placeholder="Ask a follow-up…"></textarea>
        <button id="send-btn">↑</button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script>
const logo         = document.getElementById('logo');
const dot          = document.getElementById('status-dot');
const loading      = document.getElementById('loading');
const messages     = document.getElementById('messages');
const inputBar     = document.getElementById('input-bar');
const chatInput    = document.getElementById('chat-input');
const sendBtn      = document.getElementById('send-btn');
const copyLatexBtn = document.getElementById('copy-latex-btn');

const KATEX_CFG = {
  delimiters: [
    { left: "$$", right: "$$", display: true  },
    { left: "$",  right: "$",  display: false },
    { left: "\\[", right: "\\]", display: true  },
    { left: "\\(", right: "\\)", display: false },
  ],
  throwOnError: false,
  errorColor: "rgba(255,100,100,.9)",
};

const LATEX_SOURCE = String.raw`\begin{align}
\partial_t u + (-\Delta)^\beta u + u \cdot \nabla u + \nabla p &= 0 \tag{1.1} \\
\operatorname{div} u &= 0 \tag{1.2} \\
u(\cdot,0) &= u_0(\cdot) \tag{1.3}
\end{align}`;

const CONTENT = {
  first: String.raw`### Analysis of the Hyper-dissipative Navier-Stokes System

The provided text defines the 3D hyper-dissipative (HD) Navier-Stokes (NS) system. This is a generalization of the classical Navier-Stokes equations where the standard Laplacian operator $\Delta$ (representing physical viscosity) is replaced by a fractional power $(-\Delta)^\beta$.

### Key Concepts

- **Hyper-dissipation:** By setting $\beta > 1$, the model introduces stronger damping at high frequencies (small scales) compared to the standard Navier-Stokes equations ($\beta = 1$).
- **Fourier Multiplier:** The operator $(-\Delta)^\beta$ is defined in the frequency domain as multiplication by $|\xi|^{2\beta}$. This highlights that the dissipation is scale-dependent, where higher wave numbers $\xi$ are damped more aggressively as $\beta$ increases.
- **Incompressibility:** Equation (1.2) enforces the divergence-free condition, which is a standard constraint for incompressible fluid flow.
- **System Components:**
- $\partial_t u$: The local acceleration of the fluid velocity.
- $u \cdot \nabla u$: The nonlinear convective term representing advection.
- $\nabla p$: The pressure gradient, which acts as a Lagrange multiplier to enforce the incompressibility constraint.

### Summary

The system describes the evolution of a velocity field $u$ in $\mathbb{R}^3$ over time $T$. The parameter $\beta$ allows researchers to study the regularity of solutions; specifically, for sufficiently large $\beta$, the hyper-dissipation is strong enough to potentially prevent the formation of singularities that remain an open problem in the standard 3D Navier-Stokes equations.`,

  pick: lower => {
    if (lower.includes('beta') || lower.includes('fourier') || lower.includes('frequen') || lower.includes('dissip') || lower.includes('hyper')) return 0;
    if (lower.includes('div') || lower.includes('incompress') || lower.includes('pressure')) return 1;
    return 2;
  },

  replies: [
    String.raw`The operator $(-\Delta)^\beta$ is defined via the **Fourier transform**:

$$\widehat{(-\Delta)^\beta f}(\xi) = |\xi|^{2\beta} \hat{f}(\xi)$$

For $\beta = 1$ this recovers the classical Laplacian. For $\beta > 1$, high-frequency components (large $|\xi|$) are penalised by $|\xi|^{2\beta}$ instead of $|\xi|^2$ — a much stronger damping.

**Why use it?** Hyper-dissipation is a common regularisation device:
- It makes global well-posedness easier to prove (Lions showed $\beta \geq 5/4$ suffices in 3D)
- It appears in turbulence modelling and numerical schemes as a selective high-frequency filter
- The limit $\beta \to 1$ recovers the classical open problem`,

    String.raw`The constraint $\operatorname{div} u = 0$ encodes **incompressibility** — fluid density is constant and as much flow enters any region as leaves it.

The pressure $p$ has no independent evolution equation. Instead, it acts as a **Lagrange multiplier** that instantaneously adjusts to enforce the divergence-free condition at every moment.

Taking the divergence of (1.1) and using $\operatorname{div} u = 0$:

$$-\Delta p = \operatorname{div}(u \cdot \nabla u)$$

So $p$ is determined elliptically by the velocity field at each time — a non-local coupling that is one source of difficulty in the analysis.`,

    String.raw`Compared to the **classical Navier-Stokes** ($\beta = 1$):

$$\partial_t u - \nu\Delta u + u \cdot \nabla u + \nabla p = 0$$

the HD system replaces $-\nu\Delta u$ with $(-\Delta)^\beta u$ (unit coefficient, $\beta > 1$).

**Why this matters for regularity:**
- Classical 3D NS: global regularity is an **open Millennium Prize Problem**
- HD NS with $\beta \geq 5/4$: global smooth solutions are **known to exist** (Lions 1969)
- The gap $1 < \beta < 5/4$ remains partially open and is an active research area

The hyper-dissipative system is thus a tractable proxy for understanding what makes the classical problem hard.`,
  ],

  restart: `**Great exploration!** Press **↺** to restart the demo.`,
};

let turns = 0;
let token = 0;

function busy(on) {
  logo.textContent = on ? 'LOOKING…' : 'LOOK';
  dot.classList.toggle('on', on);
  sendBtn.disabled = on;
  inputBar.style.pointerEvents = on ? 'none' : '';
}

function newAssistantBubble(after) {
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  if (after && after.nextSibling) messages.insertBefore(msg, after.nextSibling);
  else messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return msg.firstElementChild;
}

function addUserBubble(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `<div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return msg;
}

function md(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let s = raw;
  const B=[], M=[], I=[];
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g,  (_,l,c)=>(B.push(`<pre><code class="lang-${esc(l)}">${esc(c.replace(/\n$/,''))}</code></pre>`),`\x00B${B.length-1}\x00`));
  s = s.replace(/\$\$([\s\S]+?)\$\$/g,        (_,x)  =>(M.push(`$$${x}$$`),`\x00M${M.length-1}\x00`));
  s = s.replace(/\$([^$\n]+?)\$/g,            (_,x)  =>(M.push(`$${x}$`), `\x00M${M.length-1}\x00`));
  s = s.replace(/`([^`\n]+)`/g,               (_,c)  =>(I.push(`<code>${esc(c)}</code>`),`\x00I${I.length-1}\x00`));
  s = esc(s);
  s = s.replace(/^#{4} (.+)$/gm,'<h4>$1</h4>').replace(/^#{3} (.+)$/gm,'<h3>$1</h3>')
       .replace(/^#{2} (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  s = s.replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
       .replace(/^[-*_]{3,}$/gm,'<hr>');
  s = s.replace(/((?:^[-*+] .+\n?)+)/gm, b=>`<ul>${b.trim().split('\n').map(l=>`<li>${l.replace(/^[-*+] /,'')}</li>`).join('')}</ul>`);
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm,  b=>`<ol>${b.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')}</ol>`);
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  s = s.split(/\n\n+/).map(c=>{
    c = c.trim();
    return !c || /^<[h1-6ulodpbh]|^\x00[BIM]/.test(c) ? c : `<p>${c.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  const attrEsc = v => v.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  s = s.replace(/\x00I(\d+)\x00/g,(_,i)=>I[+i])
       .replace(/\x00B(\d+)\x00/g,(_,i)=>B[+i])
       .replace(/\x00M(\d+)\x00/g,(_,i)=>`<span class="math-src" data-latex="${attrEsc(M[+i])}">${M[+i]}</span>`);
  return s;
}

function selectionToLatexText(sel) {
  const range = sel.getRangeAt(0);
  const ancestor = range.commonAncestorContainer;
  const mathSrc = (ancestor.nodeType === Node.ELEMENT_NODE ? ancestor : ancestor.parentElement)?.closest('.math-src');
  if (mathSrc) return mathSrc.dataset.latex ?? '';
  const root = ancestor.nodeType === Node.ELEMENT_NODE ? ancestor : ancestor.parentElement;
  const parts = [];
  (function walk(node) {
    if (!range.intersectsNode(node)) return;
    if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.classList.contains('math-src')) { parts.push(node.dataset.latex ?? ''); return; }
      if (node.classList.contains('katex-mathml')) return;
    }
    if (node.nodeType === Node.TEXT_NODE) {
      const t = node.textContent ?? '';
      if (node === range.startContainer && node === range.endContainer) parts.push(t.slice(range.startOffset, range.endOffset));
      else if (node === range.startContainer) parts.push(t.slice(range.startOffset));
      else if (node === range.endContainer) parts.push(t.slice(0, range.endOffset));
      else parts.push(t);
      return;
    }
    for (const child of node.childNodes) walk(child);
  })(root);
  return parts.join('');
}

function stream(myToken, bubble, text, onDone) {
  const tokens = text.split(/(\s+)/);
  let acc = '', i = 0;
  function tick() {
    if (token !== myToken) return;
    if (i >= tokens.length) {
      bubble.innerHTML = md(acc);
      if (window.renderMathInElement) try { renderMathInElement(bubble, KATEX_CFG); } catch(e){}
      messages.scrollTop = messages.scrollHeight;
      onDone && onDone();
      return;
    }
    const take = Math.min(Math.floor(Math.random() * 2) + 1, tokens.length - i);
    acc += tokens.slice(i, i + take).join('');
    i += take;
    bubble.innerHTML = md(acc);
    messages.scrollTop = messages.scrollHeight;
    setTimeout(tick, 10 + Math.random() * 18);
  }
  tick();
}

function copyLatex() {
  try { navigator.clipboard.writeText(LATEX_SOURCE); } catch(e) {}
  const prev = copyLatexBtn.textContent;
  copyLatexBtn.textContent = '✓';
  setTimeout(() => { copyLatexBtn.textContent = prev; }, 1200);
}

function runDemo() {
  const myToken = token;
  copyLatexBtn.style.display = 'none';
  busy(true);
  loading.style.display = 'none';
  messages.style.display = 'block';
  const bubble = newAssistantBubble();
  stream(myToken, bubble, CONTENT.first, () => {
    if (token !== myToken) return;
    copyLatexBtn.style.display = '';
    inputBar.classList.add('on');
    busy(false);
    chatInput.focus();
  });
}

function doSend(text, umsg) {
  busy(true);
  turns++;
  const myToken = token;
  const bubble = newAssistantBubble(umsg);
  const reply = turns >= 3 ? CONTENT.restart : CONTENT.replies[CONTENT.pick(text.toLowerCase())];
  setTimeout(() => {
    stream(myToken, bubble, reply, () => {
      if (token !== myToken) return;
      busy(false);
    });
  }, 80);
}

function send() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  chatInput.style.height = '';
  const umsg = addUserBubble(text);
  const retryBtn = document.createElement('button');
  retryBtn.className = 'retry-btn';
  retryBtn.textContent = '↺';
  retryBtn.title = 'Retry';
  retryBtn.onclick = () => {
    const next = umsg.nextElementSibling;
    if (next && next.classList.contains('assistant')) next.remove();
    turns--;
    doSend(text, umsg);
  };
  umsg.insertBefore(retryBtn, umsg.firstChild);
  doSend(text, umsg);
}

function restart() {
  token++;
  turns = 0;
  messages.innerHTML = '';
  inputBar.classList.remove('on');
  runDemo();
}

chatInput.addEventListener('input', () => {
  chatInput.style.height = '';
  chatInput.style.height = chatInput.scrollHeight + 'px';
  chatInput.style.overflowY = chatInput.scrollHeight > 120 ? 'auto' : 'hidden';
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.onclick = send;
messages.addEventListener('copy', e => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !e.clipboardData) return;
  e.preventDefault();
  e.clipboardData.setData('text/plain', selectionToLatexText(sel));
});

runDemo();
</script>
</body>
</html>
