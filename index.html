<!doctype html>
<!--
  Look — Combined Demo (Code + Math)
  Math mode requires internet for KaTeX.

  Embed (note: height 770 to leave room for the floating panels above):
  <iframe
    src="https://trylookai.github.io/ideal-waddle"
    width="640" height="770"
    style="border:none;border-bottom-left-radius:28px;border-bottom-right-radius:28px;overflow:hidden;box-shadow:none;background-color:transparent"
    allowtransparency="true"
  ></iframe>
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Look — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;height:100%;
      background-color: transparent !important;
      background: transparent !important;
      overflow:hidden;
      position:relative;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    }

    /* ── Stage: shared anchor so panels & app stay locked together ── */
    .stage{
      position:absolute;
      bottom:0;left:50%;
      transform:translateX(-50%);
      width:640px;height:770px;
    }

    /* ── Floating panels (peek out from behind the top of the app) ── */
    .bg-float{
      position:absolute;
      top:0;
      left:50%;
      /* hidden: parked fully behind the app window */
      transform:translateX(-50%) translateY(190px);
      opacity:0;
      transition:transform .48s cubic-bezier(.16,1,.3,1), opacity .32s ease;
      width:min(576px, 94vw);
      pointer-events:none;
      z-index:1; /* behind #app */
    }
    .bg-float.visible{
      /* slides up; almost all of the card peeks above the app window */
      transform:translateX(-50%) translateY(0);
      opacity:1;
      pointer-events:auto;
    }

    /* Both cards: same outer size, same border-radius as app window */
    .float-card{
      background:rgba(18,18,28,.97);
      border:1px solid rgba(255,255,255,.11);
      border-radius:28px;
      box-shadow:none;
      aspect-ratio:576/193;
      overflow:hidden;
    }

    /* Code card: padded text */
    #bg-code .float-card{ padding:14px 20px; }

    /* Math card: image fills edge-to-edge */
    #bg-math .float-card{ padding:0; }
    #bg-math .float-card img{ width:100%; height:100%; display:block; object-fit:fill; }

    /* Code float text */
    .float-code{
      font-family:"JetBrains Mono","Fira Code","SF Mono",Menlo,Consolas,monospace;
      font-size:11.5px;line-height:1.65;
      white-space:pre;
      color:rgba(200,240,200,.75);
    }
    .float-code .err{color:rgba(255,110,110,.65)}

    /* ── App window — pinned to bottom of stage ── */
    #app{
      position:absolute;
      bottom:0;left:0;
      width:640px;height:580px;
      display:flex;flex-direction:column;
      background:rgba(28,28,28,.92);
      backdrop-filter:blur(28px) saturate(180%) brightness(.9);
      -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(.9);
      border:1px solid rgba(255,255,255,.09);
      border-radius:28px;
      overflow:hidden;
      animation:slideUp .32s cubic-bezier(.16,1,.3,1) both;
      z-index:5; /* sits in front of the floating panels */
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}

    /* ── Header ── */
    #header{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px 11px;
      border-bottom:1px solid rgba(255,255,255,.07);
      flex-shrink:0;cursor:default;user-select:none;
    }
    .logo-text{font-size:11px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:1.8px;min-width:52px}
    .header-actions{display:flex;gap:6px;align-items:center}
    #status-dot{width:6px;height:6px;border-radius:50%;background:rgba(180,180,180,.7);animation:pulse 1.5s ease-in-out infinite;display:none}
    #status-dot.on{display:block}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .icon-btn{border:none;background:none;padding:0 2px;cursor:pointer;color:rgba(255,255,255,.35);font-size:15px;line-height:1;transition:color .12s;user-select:none}
    .icon-btn:hover{color:rgba(255,255,255,.85)}

    /* ── Mode toggle pill ── */
    .mode-toggle{
      display:flex;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      border-radius:20px;
      padding:3px;gap:2px;
    }
    .mode-btn{
      border:1px solid transparent;background:none;
      padding:4px 13px;border-radius:16px;
      font-size:10px;font-weight:700;letter-spacing:1px;
      color:rgba(255,255,255,.28);
      cursor:pointer;user-select:none;
      transition:background .15s,color .15s,border-color .15s;
      line-height:1;
    }
    .mode-btn:hover:not(.active){color:rgba(255,255,255,.55)}
    .mode-btn.active{
      background:rgba(100,160,255,.18);
      color:rgba(200,225,255,.95);
      border-color:rgba(100,160,255,.28);
    }

    /* ── Body ── */
    #body{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;min-height:0}
    #loading{display:flex;align-items:center;justify-content:center;flex:1}
    .spinner{width:32px;height:32px;border:2.5px solid rgba(255,255,255,.1);border-top-color:rgba(255,255,255,.6);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Messages ── */
    #messages{
      display:none;flex:1;overflow-y:auto;
      padding:14px 16px 10px;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;
      min-height:0;
    }
    #messages::-webkit-scrollbar{width:5px}
    #messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}

    .msg{margin-bottom:14px;animation:msgIn .15s ease both}
    @keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .msg.user{display:flex;justify-content:flex-end}
    .msg.user .bubble{
      max-width:78%;
      background:rgba(100,160,255,.18);border:1px solid rgba(100,160,255,.25);
      border-radius:16px 16px 4px 16px;padding:8px 13px;
      font-size:13.5px;line-height:1.5;color:rgba(220,230,255,.95);word-break:break-word;
    }
    .msg.assistant .bubble{color:rgba(230,230,245,.92);font-size:14px;line-height:1.65;word-break:break-word}

    .typing-dots{display:flex;gap:4px;align-items:center;padding:6px 2px}
    .typing-dots span{width:5px;height:5px;background:rgba(255,255,255,.4);border-radius:50%;animation:dot-bounce 1.2s ease-in-out infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dot-bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}

    /* ── Bubble content ── */
    .bubble h1,.bubble h2,.bubble h3,.bubble h4{color:rgba(255,255,255,.95);font-weight:600;margin:18px 0 8px;line-height:1.3}
    .bubble h1{font-size:18px;margin-top:0}
    .bubble h2{font-size:16px;margin-top:14px}
    .bubble h3{font-size:14px;color:rgba(200,200,230,.9)}
    .bubble h4{font-size:13px;color:rgba(180,180,220,.8)}
    .bubble p{margin:8px 0}
    .bubble p:first-child{margin-top:0}
    .bubble ul,.bubble ol{margin:8px 0;padding-left:20px}
    .bubble li{margin:4px 0}
    .bubble strong{color:rgba(255,255,255,.95);font-weight:600}
    .bubble em{color:rgba(200,200,255,.85)}
    .bubble code{
      font-family:"JetBrains Mono","Fira Code","SF Mono",Menlo,Consolas,monospace;
      font-size:12.5px;background:rgba(255,255,255,.08);color:rgba(160,220,255,.95);
      padding:2px 5px;border-radius:4px;border:1px solid rgba(255,255,255,.07);
    }
    .bubble pre{
      background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);
      border-radius:8px;padding:14px 16px;overflow-x:auto;margin:10px 0;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
    }
    .bubble pre code{background:none;border:none;padding:0;color:rgba(200,240,200,.9);line-height:1.55;white-space:pre}
    .bubble blockquote{border-left:3px solid rgba(255,255,255,.25);margin:10px 0;padding:6px 14px;background:rgba(255,255,255,.04);border-radius:0 6px 6px 0;color:rgba(200,200,230,.85)}
    .bubble hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:14px 0}
    .bubble a{color:#7c9ef7;text-decoration:underline;text-underline-offset:2px}

    /* ── KaTeX overrides ── */
    .katex{color:rgba(230,230,230,.95);font-size:1em}
    .katex-display{margin:12px 0;overflow-x:auto}
    .katex-display>.katex{color:rgba(235,235,235,.97)}

    /* ── Input bar ── */
    #input-bar{display:none;padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);gap:8px;align-items:flex-end;flex-shrink:0}
    #input-bar.on{display:flex}
    #chat-input{
      flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:20px;padding:8px 14px;color:rgba(230,230,245,.92);
      font-family:inherit;font-size:13.5px;line-height:1.45;
      resize:none;outline:none;min-height:36px;max-height:120px;overflow-y:auto;
      transition:border-color .15s;scrollbar-width:thin;
    }
    #chat-input:focus{border-color:rgba(100,160,255,.4)}
    #chat-input::placeholder{color:rgba(255,255,255,.25)}
    #send-btn{
      width:32px;height:32px;border-radius:50%;border:none;
      background:rgba(100,160,255,.25);color:rgba(180,210,255,.9);
      font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:background .12s,color .12s;line-height:1;
    }
    #send-btn:hover:not(:disabled){background:rgba(100,160,255,.4);color:rgba(220,235,255,.95)}
    #send-btn:disabled{opacity:.35;cursor:default}

    /* ── Mobile: stage fills viewport, app fills stage minus panel space ── */
    @media(max-width:639px){
      .stage{left:0;transform:none;width:100%;height:100%}
      #app{width:100%;height:calc(100% - 190px);border-radius:24px 24px 0 0}
    }

    /* ── Mobile: larger text and touch targets ── */
    @media(max-width:639px){
      #header{padding:14px 18px 13px}
      .logo-text{font-size:13px;letter-spacing:2px}
      .mode-btn{font-size:11px;padding:5px 15px}
      .icon-btn{font-size:19px;padding:0 5px}
      #messages{padding:16px 16px 12px}
      .msg.user .bubble{font-size:15.5px;line-height:1.55;padding:9px 14px}
      .msg.assistant .bubble{font-size:15.5px;line-height:1.7}
      .bubble h1{font-size:20px}
      .bubble h2{font-size:18px}
      .bubble h3{font-size:16px}
      .bubble h4{font-size:14.5px}
      .bubble code{font-size:13.5px}
      .bubble pre{padding:14px 16px}
      #input-bar{padding:12px 14px;gap:10px}
      #chat-input{font-size:16px;padding:9px 16px;border-radius:22px}
      #send-btn{width:38px;height:38px;font-size:18px}
      .typing-dots span{width:6px;height:6px}
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script>
const logo      = document.getElementById('logo');
const dot       = document.getElementById('status-dot');
const loading   = document.getElementById('loading');
const messages  = document.getElementById('messages');
const inputBar  = document.getElementById('input-bar');
const chatInput = document.getElementById('chat-input');
const sendBtn   = document.getElementById('send-btn');
const bgCode    = document.getElementById('bg-code');
const bgMath    = document.getElementById('bg-math');

// ── KaTeX config ─────────────────────────────────────────────────────────────
const KATEX_CFG = {
  delimiters: [
    { left: "$$", right: "$$", display: true  },
    { left: "$",  right: "$",  display: false },
    { left: "\\[", right: "\\]", display: true  },
    { left: "\\(", right: "\\)", display: false },
  ],
  throwOnError: false,
  errorColor: "rgba(255,100,100,.9)",
};

// ── Content ──────────────────────────────────────────────────────────────────
const CONTENT = {
  code: {
    first:
`## IndexError: list index out of range

You're trying to access an element at an index that doesn't exist in the list.

**Root cause:** The list has 3 items (indices \`0\`–\`2\`), but the code accesses index \`3\`.

**The fix:**

\`\`\`python
items = ["apple", "banana", "cherry"]

# ❌ Bug
print(items[3])   # IndexError!

# ✅ Loop safely
for item in items:
    print(item)

# ✅ Or guard with len()
if len(items) > 3:
    print(items[3])
\`\`\`

**Quick tips:**
- Use \`items[-1]\` to get the last element safely
- Use \`enumerate()\` when you need both index and value
- Wrap risky access in \`try/except IndexError\` for uncertain inputs`,

    pick: lower =>
      (lower.includes('fix') || lower.includes('safe') || lower.includes('how')) ? 1 : 0,

    replies: [
`The cleanest Python way is \`enumerate()\` — gives you both index and value without manual tracking:

\`\`\`python
items = ["apple", "banana", "cherry"]

for i, item in enumerate(items):
    print(f"[{i}] {item}")

# Output:
# [0] apple
# [1] banana
# [2] cherry
\`\`\`

This avoids off-by-one errors entirely and reads clearly.`,

`Here's a reusable helper for safe list access:

\`\`\`python
def safe_get(lst, index, default=None):
    try:
        return lst[index]
    except IndexError:
        return default

items = ["apple", "banana", "cherry"]
print(safe_get(items, 10, "not found"))  # → "not found"
\`\`\`

Returns a \`default\` instead of raising — useful when list size isn't guaranteed.`],

    restart: `**That's the core of it!** Press **↺** to restart or switch to **MATH** to see how Look handles equations.`,
  },

  math: {
    first: String.raw`## Conjecture 1.1 — Navier-Stokes Global Regularity

This is the **Clay Millennium Prize Problem** — one of seven unsolved problems with a $1,000,000 prize. The conjecture asks whether smooth fluid flows always stay smooth, or can they blow up to infinite velocity in finite time?

**The equations (1.1) from your capture:**

$$\partial_t u + (u \cdot \nabla)u = \nu \Delta u - \nabla p$$

$$\nabla \cdot u = 0, \quad u(0,\cdot) = u_0$$

**Term by term:**

- $\partial_t u$ — how velocity changes over time at a fixed point
- $(u \cdot \nabla)u$ — convective term: fluid carrying its own momentum (the nonlinear term)
- $\nu \Delta u$ — viscous diffusion ($\nu > 0$ is kinematic viscosity, $\nu = \mu/\rho$)
- $-\nabla p$ — pressure gradient driving the flow
- $\nabla \cdot u = 0$ — incompressibility: density stays constant
- $u(0,\cdot) = u_0$ — initial velocity field, prescribed at $t = 0$

**The setup:** $u_0$ must lie in the **Schwartz class** — infinitely differentiable and rapidly decaying at infinity. The solution must also satisfy $u \in L_t^\infty L_x^2$ (finite kinetic energy for all finite $T$).

**Why it's open:** The nonlinear term $(u \cdot \nabla)u$ can amplify disturbances. Nobody has proved smooth solutions always exist in 3D — or found a counterexample.`,

    pick: lower => {
      if (lower.includes('turbul') || lower.includes('nonlinear') || lower.includes('reynolds') || lower.includes('chaotic')) return 0;
      if (lower.includes('viscous') || lower.includes('viscosity') || lower.includes('friction') || lower.includes('mu') || lower.includes('μ')) return 1;
      return 2;
    },

    replies: [
      String.raw`The culprit is the **convective term** $(\mathbf{u} \cdot \nabla)\mathbf{u}$.

It means the velocity field *advects itself* — fast-moving fluid carries its momentum into surrounding regions, creating chaotic feedback. This nonlinearity is what produces turbulence.

The **Reynolds number** predicts when it takes over:

$$Re = \frac{\rho \, u \, L}{\mu}$$

- $Re \lesssim 2300$ → smooth **laminar** flow
- $Re \gtrsim 4000$ → chaotic **turbulent** flow

Whether smooth 3D solutions always exist is a **Millennium Prize Problem** — unsolved since 2000, worth **$1,000,000**.`,

      String.raw`The viscous term $\mu \nabla^2 \mathbf{u}$ is a diffusion operator on the velocity field.

The Laplacian $\nabla^2 \mathbf{u}$ measures how much velocity at a point *differs from its neighbors* — a smoothing force that resists sharp velocity gradients.

**Intuition:** stir honey vs. water:
- Honey: high $\mu$ → momentum diffuses rapidly → smooth laminar flow
- Water: low $\mu$ → layers slide freely → turbulence at modest speeds

At high Reynolds number $Re = \rho u L / \mu$, viscosity matters only in thin **boundary layers** near walls, not in the bulk flow.`,

      String.raw`The continuity equation $\nabla \cdot \mathbf{u} = 0$ enforces **incompressibility** — divergence of velocity is zero everywhere.

Physically: as much fluid flows *into* any volume as flows *out*. Density stays constant.

This means pressure $p$ has no independent evolution equation — it acts as a Lagrange multiplier enforcing divergence-free flow. Solvers like **SIMPLE** or **projection methods** iteratively correct $p$ to satisfy $\nabla \cdot \mathbf{u} = 0$ at each time step.`,
    ],

    restart: `**Great exploration!** Press **↺** to restart or switch to **CODE** to see how Look handles errors and bugs.`,
  },
};

// ── State ────────────────────────────────────────────────────────────────────
let mode  = 'math';
let turns = 0;
let token = 0;

// ── Background panel toggle ──────────────────────────────────────────────────
function updateBg() {
  bgCode.classList.toggle('visible', mode === 'code');
  bgMath.classList.toggle('visible', mode === 'math');
}

// ── Markdown renderer (mirrors overlay.ts) ──────────────────────────────────
function md(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let s = raw;
  const B=[], M=[], I=[];
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g,  (_,l,c)=>(B.push(`<pre><code class="lang-${esc(l)}">${esc(c.replace(/\n$/,''))}</code></pre>`),`\x00B${B.length-1}\x00`));
  s = s.replace(/\$\$([\s\S]+?)\$\$/g,        (_,x)  =>(M.push(`$$${x}$$`),`\x00M${M.length-1}\x00`));
  s = s.replace(/\$([^$\n]+?)\$/g,            (_,x)  =>(M.push(`$${x}$`), `\x00M${M.length-1}\x00`));
  s = s.replace(/`([^`\n]+)`/g,               (_,c)  =>(I.push(`<code>${esc(c)}</code>`),`\x00I${I.length-1}\x00`));
  s = esc(s);
  s = s.replace(/^#{4} (.+)$/gm,'<h4>$1</h4>').replace(/^#{3} (.+)$/gm,'<h3>$1</h3>')
       .replace(/^#{2} (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  s = s.replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
       .replace(/^[-*_]{3,}$/gm,'<hr>');
  s = s.replace(/((?:^[-*+] .+\n?)+)/gm, b=>`<ul>${b.trim().split('\n').map(l=>`<li>${l.replace(/^[-*+] /,'')}</li>`).join('')}</ul>`);
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm,  b=>`<ol>${b.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')}</ol>`);
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  s = s.split(/\n\n+/).map(c=>{
    c = c.trim();
    return !c || /^<[h1-6ulodpbh]|^\x00[BIM]/.test(c) ? c : `<p>${c.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  s = s.replace(/\x00I(\d+)\x00/g,(_,i)=>I[+i])
       .replace(/\x00B(\d+)\x00/g,(_,i)=>B[+i])
       .replace(/\x00M(\d+)\x00/g,(_,i)=>M[+i]);
  return s;
}

function renderMath(el) {
  if (window.renderMathInElement) try { renderMathInElement(el, KATEX_CFG); } catch(e){}
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function busy(on) {
  logo.textContent = on ? 'LOOKING…' : 'LOOK';
  dot.classList.toggle('on', on);
  sendBtn.disabled = on;
  inputBar.style.pointerEvents = on ? 'none' : '';
}

function showChat() {
  loading.style.display = 'none';
  messages.style.display = 'block';
}

function newAssistantBubble() {
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return msg.firstElementChild;
}

function addUserBubble(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `<div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

// ── Streaming simulation ─────────────────────────────────────────────────────
function stream(myToken, bubble, text, onDone) {
  const tokens = text.split(/(\s+)/);
  let acc = '';
  let i   = 0;
  function tick() {
    if (token !== myToken) return;
    if (i >= tokens.length) {
      bubble.innerHTML = md(acc);
      if (mode === 'math') renderMath(bubble);
      messages.scrollTop = messages.scrollHeight;
      onDone && onDone();
      return;
    }
    const take = Math.min(Math.floor(Math.random() * 2) + 1, tokens.length - i);
    acc += tokens.slice(i, i + take).join('');
    i   += take;
    bubble.innerHTML = md(acc);
    messages.scrollTop = messages.scrollHeight;
    setTimeout(tick, 10 + Math.random() * 18);
  }
  tick();
}

// ── Demo sequence ─────────────────────────────────────────────────────────────
function runDemo() {
  const myToken = token;
  updateBg();
  loading.style.display = 'flex';
  messages.style.display = 'none';
  busy(true);

  setTimeout(() => {
    if (token !== myToken) return;
    showChat();
    const bubble = newAssistantBubble();

    setTimeout(() => {
      if (token !== myToken) return;
      stream(myToken, bubble, CONTENT[mode].first, () => {
        if (token !== myToken) return;
        inputBar.classList.add('on');
        busy(false);
        chatInput.focus();
      });
    }, 0);
  }, 0);
}

// ── Mode switching ───────────────────────────────────────────────────────────
function setMode(m) {
  if (m === mode) return;
  mode = m;
  document.getElementById('btn-code').classList.toggle('active', m === 'code');
  document.getElementById('btn-math').classList.toggle('active', m === 'math');
  restart();
}

// ── Follow-up ────────────────────────────────────────────────────────────────
function send() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  chatInput.style.height = '';

  addUserBubble(text);
  busy(true);
  turns++;

  const myToken = token;
  const bubble  = newAssistantBubble();
  const c       = CONTENT[mode];
  const reply   = turns >= 3 ? c.restart : c.replies[c.pick(text.toLowerCase())];

  setTimeout(() => {
    stream(myToken, bubble, reply, () => {
      if (token !== myToken) return;
      busy(false);
    });
  }, 80);
}

// ── Restart ───────────────────────────────────────────────────────────────────
function restart() {
  token++;
  turns = 0;
  messages.innerHTML = '';
  inputBar.classList.remove('on');
  runDemo();
}

// ── Events ───────────────────────────────────────────────────────────────────
chatInput.addEventListener('input', () => {
  chatInput.style.height = '';
  chatInput.style.height = chatInput.scrollHeight + 'px';
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.onclick = send;

// ── Init ─────────────────────────────────────────────────────────────────────
runDemo();
</script>
</body>
</html>
