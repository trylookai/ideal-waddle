<!doctype html>
<!--
  Look — Demo (Math)

  Responsive embed (scales on mobile — use this in Framer):
  <div style="width:100%;max-width:640px;aspect-ratio:640/770;margin:0 auto">
    <iframe
      src="https://trylookai.github.io/ideal-waddle"
      style="width:100%;height:100%;border:none;overflow:hidden;background:transparent"
      allowtransparency="true"
    ></iframe>
  </div>

  Fixed embed (640×770):
  <iframe
    src="https://trylookai.github.io/ideal-waddle"
    width="640" height="770"
    style="border:none;overflow:hidden;background:transparent"
    allowtransparency="true"
  ></iframe>
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Look — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:transparent!important;overflow:hidden;position:relative;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}

    .stage{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:640px;height:770px}

    /* Floating math panel */
    .bg-float{
      position:absolute;top:0;left:50%;
      transform:translateX(-50%) translateY(190px);
      opacity:0;transition:transform .48s cubic-bezier(.16,1,.3,1),opacity .32s ease;
      width:min(576px,94vw);pointer-events:none;z-index:1;
    }
    .bg-float.visible{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
    .float-card{background:rgba(18,18,28,.97);border:1px solid rgba(255,255,255,.11);border-radius:28px;aspect-ratio:576/193;overflow:hidden}
    .float-card img{width:100%;height:100%;display:block;object-fit:fill}

    /* App window */
    #app{
      position:absolute;bottom:0;left:0;width:640px;height:580px;
      display:flex;flex-direction:column;
      background:rgba(28,28,28,.95);
      backdrop-filter:blur(28px) saturate(180%) brightness(.9);
      -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(.9);
      border:1px solid rgba(255,255,255,.09);border-radius:28px;overflow:hidden;
      animation:slideUp .32s cubic-bezier(.16,1,.3,1) both;z-index:5;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}

    /* Header */
    #header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 11px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;cursor:default;user-select:none}
    .logo-text{font-size:11px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:1.8px}
    .header-actions{display:flex;gap:6px;align-items:center}
    #status-dot{width:6px;height:6px;border-radius:50%;background:rgba(180,180,180,.7);animation:pulse 1.5s ease-in-out infinite;display:none}
    #status-dot.on{display:block}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .icon-btn{border:1px solid rgba(255,255,255,.18);background:linear-gradient(160deg,rgb(90,90,112) 0%,rgb(62,62,82) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 1px 4px rgba(0,0,0,.45);padding:3px 7px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.85);font-size:14px;line-height:1;transition:background .15s,color .15s,border-color .15s,box-shadow .15s;user-select:none}
    .icon-btn:hover{background:linear-gradient(160deg,rgb(108,108,134) 0%,rgb(78,78,100) 100%);border-color:rgba(255,255,255,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.32),0 1px 6px rgba(0,0,0,.5);color:#fff}
    .icon-btn:disabled{opacity:.3;cursor:default;box-shadow:none}

    /* Body */
    #body{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;min-height:0}
    #loading{display:flex;align-items:center;justify-content:center;flex:1}
    .spinner{width:32px;height:32px;border:2.5px solid rgba(255,255,255,.1);border-top-color:rgba(255,255,255,.6);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Messages */
    #messages{display:none;flex:1;overflow-y:auto;padding:14px 16px 10px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;min-height:0}
    #messages::-webkit-scrollbar{width:5px}
    #messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
    .msg{margin-bottom:14px;animation:msgIn .15s ease both}
    @keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .msg.user{display:flex;justify-content:flex-end}
    .msg.user .bubble{max-width:78%;background:linear-gradient(160deg,rgb(65,130,255) 0%,rgb(42,96,224) 100%);border:1px solid rgba(140,185,255,.45);box-shadow:inset 0 1px 0 rgba(200,225,255,.3),0 1px 6px rgba(50,100,240,.4);border-radius:16px 16px 4px 16px;padding:8px 13px;font-size:13.5px;line-height:1.5;color:#fff;word-break:break-word}
    .msg.assistant .bubble{color:rgba(230,230,245,.92);font-size:14px;line-height:1.65;word-break:break-word}
    .typing-dots{display:flex;gap:4px;align-items:center;padding:6px 2px}
    .typing-dots span{width:5px;height:5px;background:rgba(255,255,255,.4);border-radius:50%;animation:dot-bounce 1.2s ease-in-out infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dot-bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}

    /* Bubble content */
    .bubble h1,.bubble h2,.bubble h3,.bubble h4{color:rgba(255,255,255,.95);font-weight:600;margin:18px 0 8px;line-height:1.3}
    .bubble h1{font-size:18px;margin-top:0}
    .bubble h2{font-size:16px;margin-top:14px}
    .bubble h3{font-size:14px;color:rgba(200,200,230,.9)}
    .bubble h4{font-size:13px;color:rgba(180,180,220,.8)}
    .bubble p{margin:8px 0}
    .bubble p:first-child{margin-top:0}
    .bubble ul,.bubble ol{margin:8px 0;padding-left:20px}
    .bubble li{margin:4px 0}
    .bubble strong{color:rgba(255,255,255,.95);font-weight:600}
    .bubble em{color:rgba(200,200,255,.85)}
    .bubble code{font-family:"JetBrains Mono","Fira Code","SF Mono",Menlo,Consolas,monospace;font-size:12.5px;background:rgba(255,255,255,.08);color:rgba(160,220,255,.95);padding:2px 5px;border-radius:4px;border:1px solid rgba(255,255,255,.07)}
    .bubble pre{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:14px 16px;overflow-x:auto;margin:10px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
    .bubble pre code{background:none;border:none;padding:0;color:rgba(200,240,200,.9);line-height:1.55;white-space:pre}
    .bubble blockquote{border-left:3px solid rgba(255,255,255,.25);margin:10px 0;padding:6px 14px;background:rgba(255,255,255,.04);border-radius:0 6px 6px 0;color:rgba(200,200,230,.85)}
    .bubble hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:14px 0}
    .bubble a{color:#7c9ef7;text-decoration:underline;text-underline-offset:2px}
    .katex{color:rgba(230,230,230,.95);font-size:1em}
    .katex-display{margin:12px 0;overflow-x:auto}
    .katex-display>.katex{color:rgba(235,235,235,.97)}

    /* Input bar */
    #input-bar{display:none;padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
    #input-bar.on{display:block}
    #input-wrap{position:relative}
    #chat-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 52px 10px 14px;color:rgba(230,230,245,.92);font-family:inherit;font-size:13.5px;line-height:1.45;resize:none;outline:none;min-height:40px;max-height:120px;overflow-y:auto;transition:border-color .15s;scrollbar-width:thin;display:block}
    #chat-input:focus{border-color:rgba(100,160,255,.4)}
    #chat-input::placeholder{color:rgba(255,255,255,.25)}
    #send-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;border:1px solid rgba(140,185,255,.45);background:linear-gradient(160deg,rgb(65,130,255) 0%,rgb(42,96,224) 100%);box-shadow:inset 0 1px 0 rgba(200,225,255,.3),0 2px 10px rgba(50,100,240,.5);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,box-shadow .15s;line-height:1}
    #send-btn:hover:not(:disabled){background:linear-gradient(160deg,rgb(85,148,255) 0%,rgb(58,112,240) 100%);border-color:rgba(160,200,255,.55);box-shadow:inset 0 1px 0 rgba(220,235,255,.38),0 2px 14px rgba(60,110,255,.6)}
    #send-btn:disabled{opacity:.3;cursor:default;box-shadow:none}

    /* Mobile */
    @media(max-width:639px){
      html,body{border-radius:0 0 24px 24px}
      .stage{left:0;transform:none;width:100%;height:100%}
      .bg-float{transform:translateX(-50%) translateY(min(190px,calc(94vw * 193 / 576)))}
      #app{width:100%;height:calc(100% - min(190px,calc(94vw * 193 / 576)));border-radius:24px}
      #header{padding:14px 18px 13px}
      .logo-text{font-size:13px;letter-spacing:2px}
      .icon-btn{font-size:16px;padding:4px 9px}
      #messages{padding:16px 16px 12px}
      .msg.user .bubble{font-size:15.5px;line-height:1.55;padding:9px 14px}
      .msg.assistant .bubble{font-size:15.5px;line-height:1.7}
      .bubble h1{font-size:20px}.bubble h2{font-size:18px}.bubble h3{font-size:16px}
      #input-bar{padding:12px 14px}
      #chat-input{font-size:16px}
      #send-btn{width:38px;height:38px;font-size:19px}
      .typing-dots span{width:6px;height:6px}
    }
  </style>
</head>
<body>
<div class="stage">

  <div id="bg-math" class="bg-float visible">
    <div class="float-card">
      <img src="1.png" alt="Navier-Stokes equations">
    </div>
  </div>

  <div id="app">
    <div id="header">
      <span class="logo-text" id="logo">LOOK</span>
      <div class="header-actions">
        <div id="status-dot"></div>
        <button class="icon-btn" id="copy-latex-btn" title="Copy LaTeX" style="display:none" onclick="copyLatex()">∑</button>
        <button class="icon-btn" onclick="restart()">↺</button>
        <button class="icon-btn" style="cursor:not-allowed" title="(demo only)">✕</button>
      </div>
    </div>
    <div id="body">
      <div id="loading"><div class="spinner"></div></div>
      <div id="messages"></div>
    </div>
    <div id="input-bar">
      <div id="input-wrap">
        <textarea id="chat-input" rows="1" placeholder="Ask a follow-up…"></textarea>
        <button id="send-btn">↑</button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script>
const logo         = document.getElementById('logo');
const dot          = document.getElementById('status-dot');
const loading      = document.getElementById('loading');
const messages     = document.getElementById('messages');
const inputBar     = document.getElementById('input-bar');
const chatInput    = document.getElementById('chat-input');
const sendBtn      = document.getElementById('send-btn');
const copyLatexBtn = document.getElementById('copy-latex-btn');

const KATEX_CFG = {
  delimiters: [
    { left: "$$", right: "$$", display: true  },
    { left: "$",  right: "$",  display: false },
    { left: "\\[", right: "\\]", display: true  },
    { left: "\\(", right: "\\)", display: false },
  ],
  throwOnError: false,
  errorColor: "rgba(255,100,100,.9)",
};

const LATEX_SOURCE = String.raw`\begin{align}
\partial_t u + (u \cdot \nabla)u &= \nu \Delta u - \nabla p \tag{1.1a} \\
\nabla \cdot u &= 0, \quad u(0,\cdot) = u_0 \tag{1.1b}
\end{align}`;

const CONTENT = {
  first: String.raw`## Conjecture 1.1 — Navier-Stokes Global Regularity

This is the **Clay Millennium Prize Problem** — one of seven unsolved problems with a $1,000,000 prize. The conjecture asks whether smooth fluid flows always stay smooth, or can they blow up to infinite velocity in finite time?

**The equations (1.1) from your capture:**

$$\partial_t u + (u \cdot \nabla)u = \nu \Delta u - \nabla p$$

$$\nabla \cdot u = 0, \quad u(0,\cdot) = u_0$$

**Term by term:**

- $\partial_t u$ — how velocity changes over time at a fixed point
- $(u \cdot \nabla)u$ — convective term: fluid carrying its own momentum (the nonlinear term)
- $\nu \Delta u$ — viscous diffusion ($\nu > 0$ is kinematic viscosity, $\nu = \mu/\rho$)
- $-\nabla p$ — pressure gradient driving the flow
- $\nabla \cdot u = 0$ — incompressibility: density stays constant
- $u(0,\cdot) = u_0$ — initial velocity field, prescribed at $t = 0$

**Why it's open:** The nonlinear term $(u \cdot \nabla)u$ can amplify disturbances. Nobody has proved smooth solutions always exist in 3D — or found a counterexample.`,

  pick: lower => {
    if (lower.includes('turbul') || lower.includes('nonlinear') || lower.includes('reynolds')) return 0;
    if (lower.includes('viscous') || lower.includes('viscosity') || lower.includes('friction')) return 1;
    return 2;
  },

  replies: [
    String.raw`The culprit is the **convective term** $(\mathbf{u} \cdot \nabla)\mathbf{u}$.

It means the velocity field *advects itself* — fast-moving fluid carries its momentum into surrounding regions, creating chaotic feedback. This nonlinearity is what produces turbulence.

The **Reynolds number** predicts when it takes over:

$$Re = \frac{\rho \, u \, L}{\mu}$$

- $Re \lesssim 2300$ → smooth **laminar** flow
- $Re \gtrsim 4000$ → chaotic **turbulent** flow

Whether smooth 3D solutions always exist is a **Millennium Prize Problem** — unsolved since 2000, worth **$1,000,000**.`,

    String.raw`The viscous term $\mu \nabla^2 \mathbf{u}$ is a diffusion operator on the velocity field.

The Laplacian $\nabla^2 \mathbf{u}$ measures how much velocity at a point *differs from its neighbors* — a smoothing force that resists sharp velocity gradients.

**Intuition:** stir honey vs. water:
- Honey: high $\mu$ → momentum diffuses rapidly → smooth laminar flow
- Water: low $\mu$ → layers slide freely → turbulence at modest speeds

At high Reynolds number $Re = \rho u L / \mu$, viscosity matters only in thin **boundary layers** near walls, not in the bulk flow.`,

    String.raw`The continuity equation $\nabla \cdot \mathbf{u} = 0$ enforces **incompressibility** — divergence of velocity is zero everywhere.

Physically: as much fluid flows *into* any volume as flows *out*. Density stays constant.

This means pressure $p$ has no independent evolution equation — it acts as a Lagrange multiplier enforcing divergence-free flow. Solvers like **SIMPLE** or **projection methods** iteratively correct $p$ to satisfy $\nabla \cdot \mathbf{u} = 0$ at each time step.`,
  ],

  restart: `**Great exploration!** Press **↺** to restart the demo.`,
};

let turns = 0;
let token = 0;

function busy(on) {
  logo.textContent = on ? 'LOOKING…' : 'LOOK';
  dot.classList.toggle('on', on);
  sendBtn.disabled = on;
  inputBar.style.pointerEvents = on ? 'none' : '';
}

function newAssistantBubble() {
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return msg.firstElementChild;
}

function addUserBubble(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `<div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function md(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let s = raw;
  const B=[], M=[], I=[];
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g,  (_,l,c)=>(B.push(`<pre><code class="lang-${esc(l)}">${esc(c.replace(/\n$/,''))}</code></pre>`),`\x00B${B.length-1}\x00`));
  s = s.replace(/\$\$([\s\S]+?)\$\$/g,        (_,x)  =>(M.push(`$$${x}$$`),`\x00M${M.length-1}\x00`));
  s = s.replace(/\$([^$\n]+?)\$/g,            (_,x)  =>(M.push(`$${x}$`), `\x00M${M.length-1}\x00`));
  s = s.replace(/`([^`\n]+)`/g,               (_,c)  =>(I.push(`<code>${esc(c)}</code>`),`\x00I${I.length-1}\x00`));
  s = esc(s);
  s = s.replace(/^#{4} (.+)$/gm,'<h4>$1</h4>').replace(/^#{3} (.+)$/gm,'<h3>$1</h3>')
       .replace(/^#{2} (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  s = s.replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
       .replace(/^[-*_]{3,}$/gm,'<hr>');
  s = s.replace(/((?:^[-*+] .+\n?)+)/gm, b=>`<ul>${b.trim().split('\n').map(l=>`<li>${l.replace(/^[-*+] /,'')}</li>`).join('')}</ul>`);
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm,  b=>`<ol>${b.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')}</ol>`);
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  s = s.split(/\n\n+/).map(c=>{
    c = c.trim();
    return !c || /^<[h1-6ulodpbh]|^\x00[BIM]/.test(c) ? c : `<p>${c.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  s = s.replace(/\x00I(\d+)\x00/g,(_,i)=>I[+i])
       .replace(/\x00B(\d+)\x00/g,(_,i)=>B[+i])
       .replace(/\x00M(\d+)\x00/g,(_,i)=>M[+i]);
  return s;
}

function stream(myToken, bubble, text, onDone) {
  const tokens = text.split(/(\s+)/);
  let acc = '', i = 0;
  function tick() {
    if (token !== myToken) return;
    if (i >= tokens.length) {
      bubble.innerHTML = md(acc);
      if (window.renderMathInElement) try { renderMathInElement(bubble, KATEX_CFG); } catch(e){}
      messages.scrollTop = messages.scrollHeight;
      onDone && onDone();
      return;
    }
    const take = Math.min(Math.floor(Math.random() * 2) + 1, tokens.length - i);
    acc += tokens.slice(i, i + take).join('');
    i += take;
    bubble.innerHTML = md(acc);
    messages.scrollTop = messages.scrollHeight;
    setTimeout(tick, 10 + Math.random() * 18);
  }
  tick();
}

function copyLatex() {
  try { navigator.clipboard.writeText(LATEX_SOURCE); } catch(e) {}
  const prev = copyLatexBtn.textContent;
  copyLatexBtn.textContent = '✓';
  setTimeout(() => { copyLatexBtn.textContent = prev; }, 1200);
}

function runDemo() {
  const myToken = token;
  copyLatexBtn.style.display = 'none';
  busy(true);
  loading.style.display = 'none';
  messages.style.display = 'block';
  const bubble = newAssistantBubble();
  stream(myToken, bubble, CONTENT.first, () => {
    if (token !== myToken) return;
    copyLatexBtn.style.display = '';
    inputBar.classList.add('on');
    busy(false);
    chatInput.focus();
  });
}

function send() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  chatInput.style.height = '';
  addUserBubble(text);
  busy(true);
  turns++;
  const myToken = token;
  const bubble = newAssistantBubble();
  const reply = turns >= 3 ? CONTENT.restart : CONTENT.replies[CONTENT.pick(text.toLowerCase())];
  setTimeout(() => {
    stream(myToken, bubble, reply, () => {
      if (token !== myToken) return;
      busy(false);
    });
  }, 80);
}

function restart() {
  token++;
  turns = 0;
  messages.innerHTML = '';
  inputBar.classList.remove('on');
  runDemo();
}

chatInput.addEventListener('input', () => {
  chatInput.style.height = '';
  chatInput.style.height = chatInput.scrollHeight + 'px';
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.onclick = send;

runDemo();
</script>
</body>
</html>
